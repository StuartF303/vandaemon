# Mosquitto MQTT Broker Configuration for VanDaemon
# Documentation: https://mosquitto.org/man/mosquitto-conf-5.html

# ==============================================
# General Configuration
# ==============================================
# Persistence settings
# The controller OWNS this broker (ADR-001): the messaging fabric (LED dimmers,
# Victron bridge, the .NET app) must survive the .NET app and the broker restarting.
persistence true
persistence_location /mosquitto/data/
# Flush the in-memory DB to disk periodically so retained messages / sessions
# survive an unclean power-down (ACC-off in the van).
autosave_interval 60
# Keep disconnected (persistent-session) clients' subscriptions/queued messages
# for a bounded time rather than forever.
persistent_client_expiration 14d

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Connection settings
max_keepalive 60
max_connections -1
max_queued_messages 1000

# ==============================================
# Default Listener (MQTT)
# ==============================================
listener 1883
protocol mqtt

# Allow anonymous connections.
# ACCEPTABLE ONLY on a trusted private van LAN (the default appliance posture).
# To require authentication on an untrusted network, see "Single-flag auth" below.
allow_anonymous true

# ==============================================
# WebSocket Listener
# ==============================================
listener 9001
protocol websockets

# ==============================================
# Single-flag auth (password + ACL) — OFF by default
# ==============================================
# To require authentication (e.g. when the broker is exposed beyond a trusted LAN),
# perform these steps and restart the mqtt service:
#   1) set:        allow_anonymous false        (change the line above)
#   2) uncomment:  password_file /mosquitto/config/passwd
#   3) optional:   acl_file /mosquitto/config/acl.conf
#   4) create the password file from the committed example template:
#        docker exec -it vandaemon-mqtt \
#          mosquitto_passwd -c /mosquitto/config/passwd vandaemon
#      (see passwd.example) and copy acl.conf.example -> acl.conf (see acl.conf.example).
#   5) restart:    docker compose restart mqtt
# NOTE: only *.example files are committed; never commit a real passwd/acl.conf.
# password_file /mosquitto/config/passwd
# acl_file /mosquitto/config/acl.conf

# TLS/SSL Configuration (optional; off by default)
# cafile /mosquitto/config/ca.crt
# certfile /mosquitto/config/server.crt
# keyfile /mosquitto/config/server.key
# require_certificate false
# use_identity_as_username false

# ==============================================
# Message Size Limits
# ==============================================
# Leave max_packet_size unset = unlimited (its default). NOTE: unlike the old
# message_size_limit, max_packet_size does NOT accept 0 — omit it for "unlimited".
# max_packet_size 1048576

# ==============================================
# Retained Messages
# ==============================================
max_inflight_messages 20
max_queued_bytes 0

# ==============================================
# System Information
# ==============================================
# Publish system information to $SYS topics
# sys_interval 10

# ==============================================
# Bridge from the Victron Cerbo GX broker — DISABLED BY DEFAULT
# ==============================================
# ADR-001 / Victron draft 0003 hook: when the Victron path lands, this bridge pulls
# the Cerbo's broker topics into OUR local broker so the .NET Victron plugin reads
# from one authoritative fabric. Left fully commented so nothing dials a non-existent
# Cerbo on a fresh appliance. Fill in the Cerbo IP/credentials, uncomment, and restart.
#
# connection cerbo-bridge
# address <CERBO_IP>:1883
# bridge_protocol_version mqttv311
# cleansession false
# notifications true
# notification_topic vandaemon/bridge/cerbo/state
# restart_timeout 10
# # Import the Cerbo's Venus OS tree into a local cerbo/ prefix (read-only in):
# topic N/# in 0 "" cerbo/
# # If the Cerbo broker requires auth:
# # remote_username <user>
# # remote_password <pass>
